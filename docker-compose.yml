version: '3.9'

services:
  ingest_users:
    build:
      context: ./containers/ingest_users
    container_name: ingest_users
    command: python ingest_users.py
    environment:
      - USERS_SERVICE_URL=http://172.31.85.16:8000/api
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
    restart: on-failure:3

  ingest_orders:
    build:
      context: ./containers/ingest_orders
    container_name: ingest_orders
    command: python ingest_orders.py
    environment:
      - ORDERS_SERVICE_URL=http://172.31.85.16:3003/api
      - USERS_SERVICE_URL=http://172.31.85.16:8000/api
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
    restart: on-failure:3
